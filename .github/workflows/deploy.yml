name: Deploy prod-home

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      profile:
        description: "배포 프로필"
        required: true
        type: choice
        options:
          - prod-home

concurrency:
  group: deploy-prod-home
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on:
      - self-hosted
      - mac-mini-m4
    environment: prod
    timeout-minutes: 60
    env:
      DEPLOY_PROFILE: prod-home
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: goodjoon-company
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=release-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Python dependencies
        run: uv sync --frozen

      - name: Node dependencies
        run: npm ci

      - name: Python lint
        run: uv run ruff check .

      - name: Python type check
        run: uv run mypy apps/api apps/worker packages/shared tests

      - name: Python tests
        run: uv run pytest

      - name: Web tests
        run: npm test

      - name: Web build
        run: npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        run: |
          docker build -f apps/api/Dockerfile -t ghcr.io/${IMAGE_NAMESPACE}/goodmoneying-api:${IMAGE_TAG} .
          docker push ghcr.io/${IMAGE_NAMESPACE}/goodmoneying-api:${IMAGE_TAG}

      - name: Build and push worker
        run: |
          docker build -f apps/worker/Dockerfile -t ghcr.io/${IMAGE_NAMESPACE}/goodmoneying-worker:${IMAGE_TAG} .
          docker push ghcr.io/${IMAGE_NAMESPACE}/goodmoneying-worker:${IMAGE_TAG}

      - name: Build and push web
        run: |
          docker build --build-arg VITE_API_BASE_URL=http://app-server01:8000 -f apps/web/Dockerfile -t ghcr.io/${IMAGE_NAMESPACE}/goodmoneying-web:${IMAGE_TAG} .
          docker push ghcr.io/${IMAGE_NAMESPACE}/goodmoneying-web:${IMAGE_TAG}

      - name: Deploy profile
        run: deploy/scripts/deploy-profile.sh prod-home "${IMAGE_TAG}"

      - name: Healthcheck profile
        run: deploy/scripts/healthcheck-profile.sh prod-home

      - name: E2E against prod-home
        env:
          E2E_SKIP_WEBSERVER: "1"
          E2E_API_BASE_URL: http://app-server01:8000
          E2E_WEB_BASE_URL: http://bmax-ubuntu:8080
        run: npm run e2e
