services:
  postgres:
    image: postgres:18
    container_name: goodmoneying-postgres
    restart: unless-stopped
    env_file:
      - /opt/goodmoneying/env/infra.env
    ports:
      - "5432:5432"
    volumes:
      - /opt/goodmoneying/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
