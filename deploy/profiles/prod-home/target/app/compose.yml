services:
  api:
    image: ghcr.io/goodjoon-company/goodmoneying-api:${GOODMONEYING_IMAGE_TAG}
    container_name: goodmoneying-api
    restart: unless-stopped
    env_file:
      - ${GOODMONEYING_APP_BASE_DIR}/env/app.env
    volumes:
      - ${GOODMONEYING_APP_API_DATA_DIR}:/var/lib/goodmoneying/api
      - ${GOODMONEYING_APP_CONFIG_DIR}:/etc/goodmoneying:ro
    ports:
      - "100.115.38.59:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12

  realtime-collection-worker:
    image: ghcr.io/goodjoon-company/goodmoneying-worker:${GOODMONEYING_IMAGE_TAG}
    container_name: goodmoneying-realtime-collection-worker
    restart: unless-stopped
    env_file:
      - ${GOODMONEYING_APP_BASE_DIR}/env/app.env
    environment:
      GOODMONEYING_REALTIME_COLLECTION_INTERVAL_SECONDS: "${GOODMONEYING_REALTIME_COLLECTION_INTERVAL_SECONDS:-60}"
      GOODMONEYING_LOG_LEVEL: "${GOODMONEYING_LOG_LEVEL:-INFO}"
    volumes:
      - ${GOODMONEYING_APP_REALTIME_COLLECTION_WORKER_DATA_DIR}:/var/lib/goodmoneying/realtime-collection-worker
      - ${GOODMONEYING_APP_CONFIG_DIR}:/etc/goodmoneying:ro

  backfill-collection-worker:
    image: ghcr.io/goodjoon-company/goodmoneying-worker:${GOODMONEYING_IMAGE_TAG}
    container_name: goodmoneying-backfill-collection-worker
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "python", "-m", "goodmoneying_worker.backfill_collection_worker"]
    env_file:
      - ${GOODMONEYING_APP_BASE_DIR}/env/app.env
    environment:
      GOODMONEYING_BACKFILL_POLL_SECONDS: "${GOODMONEYING_BACKFILL_POLL_SECONDS:-10}"
      GOODMONEYING_BACKFILL_BATCH_SIZE: "${GOODMONEYING_BACKFILL_BATCH_SIZE:-3000}"
      GOODMONEYING_LOG_LEVEL: "${GOODMONEYING_LOG_LEVEL:-INFO}"
    volumes:
      - ${GOODMONEYING_APP_BACKFILL_COLLECTION_WORKER_DATA_DIR}:/var/lib/goodmoneying/backfill-collection-worker
      - ${GOODMONEYING_APP_CONFIG_DIR}:/etc/goodmoneying:ro
