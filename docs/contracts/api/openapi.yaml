openapi: 3.1.0
info:
  title: goodmoneying M1 Operations API
  version: 0.1.0
  description: 업비트 수집 파이프라인 M1 운영 서버 API 계약.
servers:
  - url: http://localhost:8000
security: []
paths:
  /health:
    get:
      summary: 헬스체크
      operationId: getHealth
      responses:
        "200":
          description: 서비스 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/dashboard/summary:
    get:
      summary: 운영 상태 대시보드 요약
      operationId: getDashboardSummary
      responses:
        "200":
          description: 파이프라인 건강도와 주요 지표
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /v1/candidate-universe:
    get:
      summary: 후보 유니버스 조회
      operationId: getCandidateUniverse
      responses:
        "200":
          description: 상위 100개 후보와 활성 수집 대상 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateUniverseResponse"
  /v1/collection-targets:
    put:
      summary: 활성 수집 대상 저장
      operationId: updateCollectionTargets
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionTargetsRequest"
      responses:
        "200":
          description: 저장된 활성 수집 대상
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionTargetsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/market-list:
    get:
      summary: 시장 리스트 조회
      operationId: getMarketList
      responses:
        "200":
          description: 현재가, 거래대금, 등락률, 품질 상태 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListResponse"
  /v1/instruments/{instrumentId}:
    get:
      summary: 거래 상품 상세 조회
      operationId: getInstrumentDetail
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
      responses:
        "200":
          description: 코인 상세 화면 View Model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/instruments/{instrumentId}/candles:
    get:
      summary: 캔들 조회
      operationId: getCandles
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 3m, 5m, 10m, 15m, 30m, 60m, 240m, 1d]
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: 원천 또는 파생 캔들 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandleSeriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/instruments/{instrumentId}/ticker-snapshots:
    get:
      summary: 현재가 스냅샷 조회
      operationId: getTickerSnapshots
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: 현재가 스냅샷 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerSnapshotsResponse"
  /v1/instruments/{instrumentId}/orderbook-summaries:
    get:
      summary: 호가 요약 조회
      operationId: getOrderbookSummaries
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: 호가 요약 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderbookSummariesResponse"
  /v1/collection-runs:
    get:
      summary: 수집 실행 조회
      operationId: getCollectionRuns
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: 최근 수집 실행 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunsResponse"
  /v1/backfill/plans:
    post:
      summary: 백필 계획 생성
      operationId: createBackfillPlan
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackfillPlanRequest"
      responses:
        "200":
          description: 보수적 추정치가 포함된 백필 계획
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillPlan"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/backfill/jobs:
    get:
      summary: 백필 작업 목록 조회
      operationId: getBackfillJobs
      responses:
        "200":
          description: 백필 작업 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJobsResponse"
    post:
      summary: 백필 작업 승인과 시작
      operationId: approveBackfillJob
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveBackfillJobRequest"
      responses:
        "201":
          description: 생성된 백필 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/backfill/jobs/{jobId}/{action}:
    post:
      summary: 백필 작업 제어
      operationId: controlBackfillJob
      security:
        - OperatorToken: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [pause, stop, resume, safe-restart]
      responses:
        "200":
          description: 갱신된 백필 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/notifications:
    get:
      summary: 알림 이벤트 조회
      operationId: getNotificationEvents
      responses:
        "200":
          description: 알림 이벤트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationEventsResponse"
components:
  securitySchemes:
    OperatorToken:
      type: apiKey
      in: header
      name: X-Operator-Token
  responses:
    BadRequest:
      description: 요청이 도메인 규칙을 만족하지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 운영 토큰이 없거나 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 요청한 리소스가 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 요청 형식 검증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    InstrumentId:
      name: instrumentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    From:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
  schemas:
    DecimalString:
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    HealthResponse:
      type: object
      required: [status, checkedAt]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        checkedAt:
          type: string
          format: date-time
    Instrument:
      type: object
      required: [id, exchange, marketCode, quoteCurrency, baseAsset, displayName]
      properties:
        id:
          type: integer
          format: int64
        exchange:
          type: string
          enum: [UPBIT]
        marketCode:
          type: string
          example: KRW-BTC
        quoteCurrency:
          type: string
          example: KRW
        baseAsset:
          type: string
          example: BTC
        displayName:
          type: string
    DashboardSummary:
      type: object
      required: [status, refreshedAt, totals, coverage, targets, alerts]
      properties:
        status:
          type: string
          enum: [normal, warning, incident]
        refreshedAt:
          type: string
          format: date-time
        totals:
          type: object
          required:
            - activeTargets
            - activeTargetLimit
            - normalTargets
            - warningTargets
            - incidentTargets
            - failedRuns24h
            - failureRate24h
            - delayedTargets
            - missingRangesOpen
            - storageBytesToday
            - storageBytesTodayDisplay
            - recentRequestCount
            - rateLimitRemainingPercent
          properties:
            activeTargets:
              type: integer
            activeTargetLimit:
              type: integer
            normalTargets:
              type: integer
            warningTargets:
              type: integer
            incidentTargets:
              type: integer
            failedRuns24h:
              type: integer
            failureRate24h:
              $ref: "#/components/schemas/DecimalString"
            delayedTargets:
              type: integer
            missingRangesOpen:
              type: integer
            storageBytesToday:
              type: integer
            storageBytesTodayDisplay:
              type: string
            recentRequestCount:
              type: integer
            rateLimitRemainingPercent:
              $ref: "#/components/schemas/DecimalString"
        coverage:
          type: array
          items:
            $ref: "#/components/schemas/CoverageStatus"
        targets:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDashboardTarget"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
        healthChecks:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheck"
    HealthCheck:
      type: object
      required: [title, status, statusLabel, detail]
      properties:
        title:
          type: string
        status:
          type: string
          enum: [normal, warning, incident]
        statusLabel:
          type: string
        detail:
          type: string
    CoverageStatus:
      type: object
      required: [instrumentId, dataType, status, lastSuccessfulAt]
      properties:
        instrumentId:
          type: integer
          format: int64
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        status:
          type: string
          enum: [normal, warning, incident, backfilling]
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        lastSuccessfulAt:
          type: string
          format: date-time
    CollectionPlan:
      type: object
      required: [instrumentId, preset, rangeStartAt, isContinuous, method, displayRange, rangeTimeZone, progressBasis]
      properties:
        instrumentId:
          type: integer
          format: int64
        preset:
          type: string
        rangeStartAt:
          type: string
          format: date-time
        rangeEndAt:
          type: [string, "null"]
          format: date-time
        isContinuous:
          type: boolean
        method:
          type: string
        displayRange:
          type: string
          example: 2026-01-01 00:00 KST ~ 현재(지속)
        rangeTimeZone:
          type: string
          enum: [KST, UTC]
        progressBasis:
          type: string
    CollectionDataStatus:
      type: object
      required: [dataType, label, status, statusLabel, lastSuccessfulAt, progressPercent, missingSegmentCount]
      properties:
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        label:
          type: string
        status:
          type: string
          enum: [normal, warning, incident, backfilling]
        statusLabel:
          type: string
        lastSuccessfulAt:
          type: string
          format: date-time
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        missingSegmentCount:
          type: integer
    CoverageSegment:
      type: object
      required: [dataType, status, offsetPercent, widthPercent, segmentStartAt, segmentEndAt, label]
      properties:
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        status:
          type: string
          enum: [collected, missing, collecting, future]
        offsetPercent:
          $ref: "#/components/schemas/DecimalString"
        widthPercent:
          $ref: "#/components/schemas/DecimalString"
        segmentStartAt:
          type: string
          format: date-time
        segmentEndAt:
          type: string
          format: date-time
        label:
          type: string
    CollectionDashboardTarget:
      type: object
      required: [instrument, overallStatus, overallStatusLabel, plan, dataStatuses, coverageSegments]
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        overallStatus:
          type: string
          enum: [latest_collecting, collecting, warning, incident]
        overallStatusLabel:
          type: string
        plan:
          $ref: "#/components/schemas/CollectionPlan"
        dataStatuses:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDataStatus"
        coverageSegments:
          type: array
          items:
            $ref: "#/components/schemas/CoverageSegment"
    CandidateUniverseResponse:
      type: object
      required: [rankedAt, entries]
      properties:
        rankedAt:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CandidateUniverseEntry"
    CandidateUniverseEntry:
      type: object
      required:
        - instrument
        - rank
        - accTradePrice24h
        - accTradePrice24hDisplay
        - selected
        - candidateStatus
        - qualityStatus
        - collectionRangeDisplay
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        rank:
          type: integer
        accTradePrice24h:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24hDisplay:
          type: string
        selected:
          type: boolean
        candidateStatus:
          type: string
          enum: [in_universe, out_of_universe]
        qualityStatus:
          type: string
          enum: [normal, warning, incident]
        collectionRangeDisplay:
          type: string
    UpdateCollectionTargetsRequest:
      type: object
      required: [instrumentIds]
      properties:
        instrumentIds:
          type: array
          maxItems: 50
          items:
            type: integer
            format: int64
        reason:
          type: string
    CollectionTargetsResponse:
      type: object
      required: [targets]
      properties:
        targets:
          type: array
          items:
            $ref: "#/components/schemas/Instrument"
    MarketListResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/MarketListRow"
    MarketListRow:
      type: object
      required:
        - instrument
        - tradePrice
        - accTradePrice24h
        - accTradePrice24hDisplay
        - qualityStatus
        - coveragePercent
        - storageBytes
        - storageBytesDisplay
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        tradePrice:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24h:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24hDisplay:
          type: string
          description: 화면 표시용 24시간 거래대금. 소수점은 제거한다.
        changeRate:
          $ref: "#/components/schemas/DecimalString"
        tickerCollectedAt:
          type: string
          format: date-time
        orderbookCollectedAt:
          type: string
          format: date-time
        qualityStatus:
          type: string
          enum: [normal, warning, incident]
        coveragePercent:
          $ref: "#/components/schemas/DecimalString"
        storageBytes:
          type: integer
        storageBytesDisplay:
          type: string
    InstrumentDetailResponse:
      type: object
      required:
        - instrument
        - latestTicker
        - latestOrderbook
        - coverage
        - duplicateRows24h
        - tickerFreshnessLabel
        - orderbookFreshnessLabel
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        latestTicker:
          $ref: "#/components/schemas/TickerSnapshot"
        latestOrderbook:
          $ref: "#/components/schemas/OrderbookSummary"
        coverage:
          type: array
          items:
            $ref: "#/components/schemas/CoverageStatus"
        duplicateRows24h:
          type: integer
        tickerFreshnessLabel:
          type: string
        orderbookFreshnessLabel:
          type: string
    CandleSeriesResponse:
      type: object
      required: [unit, candles]
      properties:
        unit:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
    Candle:
      type: object
      required: [startedAt, open, high, low, close, volume, tradeAmount, completeness]
      properties:
        startedAt:
          type: string
          format: date-time
        open:
          $ref: "#/components/schemas/DecimalString"
        high:
          $ref: "#/components/schemas/DecimalString"
        low:
          $ref: "#/components/schemas/DecimalString"
        close:
          $ref: "#/components/schemas/DecimalString"
        volume:
          $ref: "#/components/schemas/DecimalString"
        tradeAmount:
          $ref: "#/components/schemas/DecimalString"
        completeness:
          type: string
          enum: [complete, partial, empty]
    TickerSnapshotsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TickerSnapshot"
    TickerSnapshot:
      type: object
      required: [bucketAt, tradePrice, collectedAt]
      properties:
        bucketAt:
          type: string
          format: date-time
        tradePrice:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24h:
          $ref: "#/components/schemas/DecimalString"
        changeRate:
          $ref: "#/components/schemas/DecimalString"
        collectedAt:
          type: string
          format: date-time
    OrderbookSummariesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderbookSummary"
    OrderbookSummary:
      type: object
      required: [bucketAt, bestBidPrice, bestAskPrice, spread, bidDepth10, askDepth10, imbalance10, collectedAt]
      properties:
        bucketAt:
          type: string
          format: date-time
        bestBidPrice:
          $ref: "#/components/schemas/DecimalString"
        bestBidSize:
          $ref: "#/components/schemas/DecimalString"
        bestAskPrice:
          $ref: "#/components/schemas/DecimalString"
        bestAskSize:
          $ref: "#/components/schemas/DecimalString"
        spread:
          $ref: "#/components/schemas/DecimalString"
        bidDepth10:
          $ref: "#/components/schemas/DecimalString"
        askDepth10:
          $ref: "#/components/schemas/DecimalString"
        imbalance10:
          $ref: "#/components/schemas/DecimalString"
        collectedAt:
          type: string
          format: date-time
    CollectionRunsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollectionRun"
    CollectionRun:
      type: object
      required: [id, runType, dataType, status, startedAt]
      properties:
        id:
          type: integer
          format: int64
        runType:
          type: string
        dataType:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    CreateBackfillPlanRequest:
      type: object
      required: [dataType, targetStartAt, targetEndAt, instrumentIds]
      properties:
        dataType:
          type: string
          enum: [source_candle]
        targetStartAt:
          type: string
          format: date-time
        targetEndAt:
          type: string
          format: date-time
        instrumentIds:
          type: array
          items:
            type: integer
            format: int64
    BackfillPlan:
      type: object
      required: [planId, dataType, estimatedRequestCount, estimatedRowCount, targets]
      properties:
        planId:
          type: string
        dataType:
          type: string
        estimatedRequestCount:
          type: integer
        estimatedRowCount:
          type: integer
          format: int64
        estimatedStorageBytes:
          type: integer
          format: int64
        targets:
          type: array
          items:
            type: integer
            format: int64
    ApproveBackfillJobRequest:
      type: object
      required: [planId]
      properties:
        planId:
          type: string
    BackfillJobsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BackfillJob"
    BackfillJob:
      type: object
      required: [id, status, dataType, createdAt]
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum: [planned, pending, running, paused, stopped, succeeded, failed]
        dataType:
          type: string
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        createdAt:
          type: string
          format: date-time
    NotificationEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
    NotificationEvent:
      type: object
      required: [id, severity, eventType, title, message, status, createdAt]
      properties:
        id:
          type: integer
          format: int64
        severity:
          type: string
          enum: [info, warning, error, critical]
        eventType:
          type: string
        title:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [open, acknowledged, resolved]
        createdAt:
          type: string
          format: date-time
