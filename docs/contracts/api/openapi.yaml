            $ref: "#/components/schemas/StorageBreakdownItem"
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardOperationsTrendResponse:
      description: 대시보드 운영 추이 패널 응답.
      type: object
      required: [items, recommendedRefreshSeconds, refreshedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OperationsTrendPoint"
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardMissingRangesResponse:
      description: 대시보드 결측 구간 상위 패널의 페이지 응답.
      type: object
      required: [items, total, limit, offset, recommendedRefreshSeconds, refreshedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MissingRangeSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardAuditLogSummaryResponse:
      description: 대시보드 감사 로그 요약 패널 응답.
      type: object
      required:
        - targetChangeCount24h
        - backfillChangeCount24h
        - latestChangeAt
        - latestChangeLabel
        - recommendedRefreshSeconds
        - refreshedAt
      properties:
        targetChangeCount24h:
          type: integer
        backfillChangeCount24h:
          type: integer
        latestChangeAt:
          type: [string, "null"]
          format: date-time
        latestChangeLabel:
          type: string
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardSummary:
      description: 운영 콘솔 첫 화면에 필요한 파이프라인 상태, 지표, 대상, 알림 요약 View Model.
      type: object
      required:
        - status
        - refreshedAt
        - totals
        - coverage
        - targets
        - alerts
        - metricPrinciples
        - collectionActivity
        - realtimeCollectionHeatmap
        - storageBreakdown
        - operationsTrend
        - missingRangeTop
        - auditLogSummary
      properties:
        status:
          type: string
          enum: [normal, warning, incident]
        refreshedAt:
          type: string
          format: date-time
        totals:
          type: object
          required:
            - activeTargets
            - activeTargetLimit
            - normalTargets
            - warningTargets
            - incidentTargets
            - failedRuns24h
            - failureRate24h
            - delayedTargets
            - missingRangesOpen
            - storageBytesToday
            - storageBytesTodayDisplay
            - storageRowsToday
            - realtimeRowsLastMinute
            - backfillRowsLastMinute
            - recentRequestCount
          properties:
            activeTargets:
              type: integer
            activeTargetLimit:
              type: integer
            normalTargets:
              type: integer
            warningTargets:
              type: integer
            incidentTargets:
              type: integer
            failedRuns24h:
              type: integer
            failureRate24h:
              $ref: "#/components/schemas/DecimalString"
            delayedTargets:
              type: integer
            missingRangesOpen:
              type: integer
            storageBytesToday:
              type: integer
              description: UTC 오늘 생성 또는 수집된 원천/결과 행 기반 추정 저장량.
            storageBytesTodayDisplay:
              type: string
            storageRowsToday:
              type: integer
              description: UTC 오늘 생성 또는 수집된 원천/결과 행 수.
            realtimeRowsLastMinute:
              type: integer
              description: 최근 1분 실시간 증분 수집이 저장한 row 수.
            backfillRowsLastMinute:
              type: integer
              description: 최근 1분 백필 수집이 저장한 row 수.
            recentRequestCount:
              type: integer
              description: 최근 24시간 대상별 수집 결과 행 수. API 요청 수가 아니다.
        coverage:
          type: array
          items:
            $ref: "#/components/schemas/CoverageStatus"
        targets:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDashboardTarget"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
        healthChecks:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheck"
        metricPrinciples:
          type: array
          description: 실제 관측 근거가 없어서 표시하지 않는 운영 지표 원칙. 프론트엔드는 이 View Model만 렌더링하고 금지 지표 값을 합성하지 않는다.
          items:
            $ref: "#/components/schemas/MetricPrinciple"
        collectionActivity:
          type: array
          description: 최근 7일 x 24시간 수집 실행과 대상별 수집 결과 기반 활동 버킷.
          items:
            $ref: "#/components/schemas/CollectionActivityBucket"
        realtimeCollectionHeatmap:
          type: array
          description: 실시간 수집량 비교와 타입별 수집 상태를 보여주는 코인별 히트맵 데이터.
          items:
            $ref: "#/components/schemas/RealtimeCollectionHeatmapRow"
        storageBreakdown:
          type: array
          description: UTC 오늘 저장된 행 수와 명시적 row-size 추정 규칙 기반 저장량 분해.
          items:
            $ref: "#/components/schemas/StorageBreakdownItem"
        operationsTrend:
          type: array
          description: 최근 7일 저장량, 커버리지, 주의/장애 대상 추이.
          items:
            $ref: "#/components/schemas/OperationsTrendPoint"
        missingRangeTop:
          type: array
          description: source_candle 커버리지 계산 결과 기준 결측 구간 상위 코인.
          items:
            $ref: "#/components/schemas/MissingRangeSummary"
        auditLogSummary:
          $ref: "#/components/schemas/AuditLogSummary"
    MetricPrinciple:
      description: 실제 관측 근거가 없어 제외하거나 표시하는 운영 지표의 판단 근거.
      type: object
      required: [metricKey, label, displayStatus, evidenceStatus, reason]
      properties:
        metricKey:
          type: string
          enum: [rateLimitRemainingPercent, duplicateRows24h]
        label:
          type: string
        displayStatus:
          type: string
          enum: [displayed, excluded]
        evidenceStatus:
          type: string
          enum: [available, missing_persistence, missing_measurement]
        reason:
          type: string
    CollectionActivityBucket:
      description: 시간 버킷 단위의 수집 실행량과 결과량을 표현하는 활동 지표.
      type: object
      required: [bucketStartAt, runCount, resultCount, status]
      properties:
        bucketStartAt:
          type: string
          format: date-time
        runCount:
          type: integer
        resultCount:
          type: integer
        status:
          type: string
          enum: [none, low, collecting, high]
    RealtimeCollectionHeatmapCell:
      description: 1시간 단위 실시간 수집량과 타입별 기대/실측 row 수를 담은 셀.
      type: object
      required:
        - bucketStartAt
        - expectedRowsAll
        - actualRowsAll
        - expectedRowsByType
        - actualRowsByType
        - actualRatioPercent
        - status
      properties:
        bucketStartAt:
          type: string
          format: date-time
        expectedRowsAll:
          type: integer
          description: 1시간 동안 소스 캔들/현재가/호가를 합산한 기대 row 수.
        actualRowsAll:
          type: integer
          description: 1시간 동안 실측 수집된 row 수 합.
        expectedRowsByType:
          type: object
          description: 데이터 유형별 기대 row 수.
          properties:
            source_candle:
              type: integer
            ticker_snapshot:
              type: integer
            orderbook_summary:
              type: integer
        actualRowsByType:
          type: object
          description: 데이터 유형별 실제 row 수.
          properties:
            source_candle:
              type: integer
            ticker_snapshot:
              type: integer
            orderbook_summary:
              type: integer
        actualRatioPercent:
          $ref: "#/components/schemas/DecimalString"
        status:
          type: string
          enum: [none, low, collecting, high]
    RealtimeCollectionHeatmapRow:
      description: 대상별 24개 시간대 실시간 수집 히트맵 행.
      type: object
      required: [instrument, instrumentDisplayName, hourlyBuckets]
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        instrumentDisplayName:
          type: string
        hourlyBuckets:
          type: array
          items:
            $ref: "#/components/schemas/RealtimeCollectionHeatmapCell"
    StorageBreakdownItem:
      description: 데이터 유형별 저장 행 수와 추정 저장량 분해 항목.
      type: object
      required: [dataType, label, rowCount, bytes, bytesDisplay, sharePercent]
      properties:
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary, quality_result]
        label:
          type: string
        rowCount:
          type: integer
        bytes:
          type: integer
        bytesDisplay:
          type: string
        sharePercent:
          $ref: "#/components/schemas/DecimalString"
    OperationsTrendPoint:
      description: 일자별 커버리지, 저장량, 주의/장애 대상 수 추이 항목.
      type: object
      required: [bucketDate, coveragePercent, storageBytes, warningTargets, incidentTargets]
      properties:
        bucketDate:
          type: string
          format: date-time
        coveragePercent:
          $ref: "#/components/schemas/DecimalString"
        storageBytes:
          type: integer
        warningTargets:
          type: integer
        incidentTargets:
          type: integer
    MissingRangeSummary:
      description: 결측 구간이 많은 거래 상품의 커버리지와 최신 성공 시각 요약.
      type: object
      required: [instrument, missingSegmentCount, coveragePercent, lastSuccessfulAt]
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        missingSegmentCount:
          type: integer
        coveragePercent:
          $ref: "#/components/schemas/DecimalString"
        lastSuccessfulAt:
          type: string
          format: date-time
    AuditLogSummary:
      description: 수집 대상 변경과 백필 작업 변경을 요약한 운영 감사 로그 지표.
      type: object
      required:
        - targetChangeCount24h
        - backfillChangeCount24h
        - latestChangeAt
        - latestChangeLabel
      properties:
        targetChangeCount24h:
          type: integer
          description: 최근 24시간 collection_target_changes 행 수.
        backfillChangeCount24h:
          type: integer
          description: 최근 24시간 생성된 백필 작업 수.
        latestChangeAt:
          type: [string, "null"]
          format: date-time
        latestChangeLabel:
          type: string
    HealthCheck:
      description: 운영 대시보드에 표시할 개별 상태 점검 항목.
      type: object
      required: [title, status, statusLabel, detail]
      properties:
        title:
          type: string
        status:
          type: string
          enum: [normal, warning, incident]
        statusLabel:
          type: string
        detail:
          type: string
    CoverageStatus:
      description: 거래 상품과 데이터 유형별 수집 커버리지 상태.
      type: object
      required: [instrumentId, dataType, status, lastSuccessfulAt]
      properties:
        instrumentId:
          type: integer
          format: int64
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        status:
          type: string
          enum: [normal, warning, incident, backfilling]
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        lastSuccessfulAt:
          type: string
          format: date-time
    CollectionPlan:
      description: 거래 상품별 수집 범위, 방식, 진행 기준을 담는 수집 계획.
      type: object
      required: [instrumentId, preset, rangeStartAt, isContinuous, method, displayRange, rangeTimeZone, progressBasis]
      properties:
        instrumentId:
          type: integer
          format: int64
        preset:
          type: string
        rangeStartAt:
          type: string
          format: date-time
        rangeEndAt:
          type: [string, "null"]
          format: date-time
        isContinuous:
          type: boolean
        method:
          type: string
        displayRange:
          type: string
          example: 2026-01-01 00:00 KST ~ NOW
        rangeTimeZone:
          type: string
          enum: [KST, UTC]
        progressBasis:
          type: string
    CollectionDataStatus:
      description: 수집 대상 row에서 데이터 유형별 최신성, 결측, 저장 행 수를 표시하는 상태 모델.
      type: object
      required: [dataType, label, status, statusLabel, lastSuccessfulAt, progressPercent, missingSegmentCount, storedRowCount]
      properties:
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        label:
          type: string
        status:
          type: string
          enum: [normal, warning, incident, backfilling]
        statusLabel:
          type: string
        lastSuccessfulAt:
          type: string
          format: date-time
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        missingSegmentCount:
          type: integer
        storedRowCount:
          type: integer
          description: 화면 표시용 저장 행 수. source_candle은 저장된 가격 분봉 수를 의미한다.
    CoverageSegment:
      description: 수집 구간 막대에서 사용되는 시간 범위별 수집/결측/진행 상태 조각.
      type: object
      required: [dataType, status, offsetPercent, widthPercent, segmentStartAt, segmentEndAt, label]
      properties:
        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        status:
          type: string
          enum: [collected, missing, collecting, future]
        offsetPercent:
          $ref: "#/components/schemas/DecimalString"
        widthPercent:
          $ref: "#/components/schemas/DecimalString"
        segmentStartAt:
          type: string
          format: date-time
        segmentEndAt:
          type: string
          format: date-time
        label:
          type: string
    CollectionDashboardTarget:
      description: 수집 관리 화면의 거래 상품별 행에 필요한 상태와 표시 지표 View Model.
      type: object
      required:
        - instrument
        - overallStatus
        - overallStatusLabel
        - plan
        - dataStatuses
        - coverageSegments
        - changeRate
        - accTradePrice24hDisplay
        - tickerFreshnessLabel
        - coveragePercent
        - storageRowCount
        - storageBytesDisplay
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        overallStatus:
          type: string
          enum: [latest_collecting, collecting, warning, incident]
        overallStatusLabel:
          type: string
        plan:
          $ref: "#/components/schemas/CollectionPlan"
        dataStatuses:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDataStatus"
        coverageSegments:
          description: 첫 화면 성능을 위해 기본 대시보드 응답에서는 빈 배열이며, row 확장 시 lazy endpoint에서 조회한다.
          type: array
          items:
            $ref: "#/components/schemas/CoverageSegment"
        changeRate:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24hDisplay:
          type: string
        tickerFreshnessLabel:
          type: string
        coveragePercent:
          $ref: "#/components/schemas/DecimalString"
        storageRowCount:
          type: integer
          description: 화면 표시용 저장 행 수.
        storageBytesDisplay:
          type: string
    CollectionCoverageSegmentsResponse:
      description: 거래 상품 상세 확장 시 lazy 조회하는 커버리지 구간 목록 응답.
      type: object
      required: [instrumentId, items]
      properties:
        instrumentId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CoverageSegment"
    CandidateUniverseResponse:
      description: 후보 유니버스 산정 시각과 후보 거래 상품 목록 응답.
      type: object
      required: [rankedAt, entries]
      properties:
        rankedAt:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CandidateUniverseEntry"
    CandidateUniverseEntry:
      description: 후보 유니버스의 단일 거래 상품 순위, 선정 여부, 품질 상태 항목.
      type: object
      required:
        - instrument
        - rank
        - accTradePrice24h
        - accTradePrice24hDisplay
        - selected
        - candidateStatus
        - qualityStatus
        - qualityDetail
        - collectionRangeDisplay
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        rank:
          type: integer
        accTradePrice24h:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24hDisplay:
          type: string
        selected:
          type: boolean
        candidateStatus:
          type: string
          enum: [in_universe, out_of_universe]
        qualityStatus:
          type: string
          enum: [normal, warning, incident]
        qualityDetail:
          type: string
          description: 품질 배지 hover에 표시할 최신성, 결측, 중복, 저장량 요약.
        collectionRangeDisplay:
          type: string
    UpdateCollectionTargetsRequest:
      description: 운영자가 활성 수집 대상으로 저장할 거래 상품 ID 목록 요청.
      type: object
      required: [instrumentIds]
      properties:
        instrumentIds:
          type: array
          maxItems: 50
          items:
            type: integer
            format: int64
        reason:
          type: string
    CollectionTargetsResponse:
      description: 저장된 활성 수집 대상 거래 상품 목록 응답.
      type: object
      required: [targets]
      properties:
        targets:
          type: array
          items:
            $ref: "#/components/schemas/Instrument"
    MarketListResponse:
      description: 시장 리스트 화면에 표시할 거래 상품 row 목록 응답.
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/MarketListRow"
    MarketListRow:
      description: 시장 리스트의 단일 거래 상품 가격, 거래대금, 품질, 저장량 row.
      type: object
      required:
        - instrument
        - tradePrice
        - accTradePrice24h
        - accTradePrice24hDisplay
        - qualityStatus
        - coveragePercent
        - storageBytes
        - storageRowCount
        - storageBytesDisplay
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        tradePrice:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24h:
          $ref: "#/components/schemas/DecimalString"
        accTradePrice24hDisplay:
          type: string
          description: 화면 표시용 24시간 거래대금. 통화기호와 천 단위 구분자를 포함한다.
        changeRate:
          $ref: "#/components/schemas/DecimalString"
        tickerCollectedAt:
          type: string
          format: date-time
        orderbookCollectedAt:
          type: string
          format: date-time
        qualityStatus:
          type: string
          enum: [normal, warning, incident]
        coveragePercent:
          $ref: "#/components/schemas/DecimalString"
        storageBytes:
          type: integer
        storageRowCount:
          type: integer
          description: 화면 표시용 저장 행 수.
        storageBytesDisplay:
          type: string
    InstrumentDetailResponse:
      description: 개별 거래 상품 상세 화면의 최신 시세, 호가, 커버리지, 품질 이력 View Model.
      type: object
      required:
        - instrument
        - latestTicker
        - latestOrderbook
        - coverage
        - priceChangeAmount24h
        - priceChangeRate24h
        - tradeVolume24h
        - tradeVolumeChangeRate24h
        - tickerFreshnessLabel
        - orderbookFreshnessLabel
        - qualityHistory
