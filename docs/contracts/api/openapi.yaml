            $ref: "#/components/schemas/CoverageStatus"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardCollectionActivityResponse:
      description: 대시보드 수집 활동 패널 응답.
      type: object
      required: [items, recommendedRefreshSeconds, refreshedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollectionActivityBucket"
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardRealtimeHeatmapResponse:
      description: 대시보드 실시간 수집 히트맵 패널의 페이지 응답.
      type: object
      required: [items, total, limit, offset, recommendedRefreshSeconds, refreshedAt]
